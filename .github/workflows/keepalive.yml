name: Supabase Keep-Alive

# Pings the Supabase project once a day so it never auto-pauses from inactivity.
# Runs on GitHub's servers, so it works even when your computer/app is off.

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          URL="https://foabpvlwkrtiokhoyxwj.supabase.co"
          KEY="sb_publishable_kiF46tqY6LLYQSsXFRyhxA_xReqFtpz"
          curl -s -o /dev/null -w "REST status %{http_code}" "$URL/rest/v1/students?select=id&limit=1" -H "apikey: $KEY" -H "Authorization: Bearer $KEY"
          echo ""
          curl -s -o /dev/null -w "AUTH status %{http_code}" "$URL/auth/v1/health"
          echo "; keep-alive done"
